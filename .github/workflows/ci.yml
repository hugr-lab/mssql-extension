name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Docs-only PRs skip CI (lint + C++ unit tests). Prose-scanning workflows
    # (prompt-injection, secret scan) have their own triggers and still run.
    # NOTE: if Lint / "C++ Unit Tests" are required status checks, GitHub treats
    # a path-skipped required check as pending and can block docs PRs — either
    # mark them non-required or add a passing stub. See PR description.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  schedule:
    # Weekly regression build (Mondays 05:00 UTC). The heavy build job is
    # manual-dispatch only, so without this the C++ unit tests it carries
    # (incl. test_login_error_state, issue #164) and the integration suite get
    # no automatic coverage between releases. Runs build + smoke + integration;
    # Windows / Azure stay manual (cost, and #165 keeps MSVC red).
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      run_build:
        description: 'Run build and tests'
        required: false
        default: false
        type: boolean
      run_integration_tests:
        description: 'Run SQL Server integration tests (requires run_build)'
        required: false
        default: true
        type: boolean
      run_windows_build:
        description: 'Run Windows builds (MSVC and MinGW)'
        required: false
        default: false
        type: boolean
      run_azure_tests:
        description: 'Run Azure SQL/Fabric tests (requires run_build, use on feature branches only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # SQL Server test environment
  MSSQL_TEST_HOST: localhost
  MSSQL_TEST_PORT: 1433
  MSSQL_TEST_USER: sa
  MSSQL_TEST_PASS: TestPassword1
  MSSQL_TEST_DB: master

jobs:
  # ============================================================================
  # Lint Job - Check code formatting (runs on merge to main)
  # ============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14
          find src -name '*.cpp' -o -name '*.hpp' | xargs clang-format-14 --dry-run --Werror

  # ============================================================================
  # C++ Unit Tests Job - lightweight, no SQL Server / DuckDB build required.
  # Runs on every push/PR (unlike the heavy build job, which is manual).
  # Spec 053 (#161): guards the lazy GSSAPI/krb5 linking so the regression
  # cannot return — the shim must compile and add NO hard DT_NEEDED on the
  # Kerberos runtime.
  # ============================================================================
  cpp-unit-tests:
    name: C++ Unit Tests (${{ matrix.os.id }})
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - id: linux
            runner: ubuntu-latest
          - id: macos
            runner: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Install Kerberos dev headers (Linux)
        if: matrix.os.id == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev binutils pkg-config

      - name: Build + run gssapi_runtime loader unit test (spec 053)
        run: |
          if [ "${{ matrix.os.id }}" = "macos" ]; then
            clang++ -std=c++17 -pthread -DMSSQL_ENABLE_KRB5=1 -I src/include \
              test/cpp/test_gssapi_runtime.cpp src/tds/auth/gssapi_runtime.cpp \
              -framework GSS -o /tmp/test_gssapi_runtime
          else
            g++ -std=c++17 -pthread -DMSSQL_ENABLE_KRB5=1 -I src/include \
              $(pkg-config --cflags krb5-gssapi krb5) \
              test/cpp/test_gssapi_runtime.cpp src/tds/auth/gssapi_runtime.cpp \
              -ldl -o /tmp/test_gssapi_runtime
          fi
          /tmp/test_gssapi_runtime

      - name: Assert shim has no Kerberos DT_NEEDED (Linux)
        if: matrix.os.id == 'linux'
        run: |
          echo "Dynamic deps of the shim test binary (must NOT list gssapi/krb5):"
          readelf -d /tmp/test_gssapi_runtime | grep NEEDED || true
          if readelf -d /tmp/test_gssapi_runtime | grep NEEDED | grep -iqE 'gssapi|krb5'; then
            echo "::error::shim links the Kerberos runtime at load time — issue #161 regression (spec 053)."
            exit 1
          fi
          echo "OK: shim resolves GSSAPI/krb5 lazily via dlopen; no hard dependency."

  # ============================================================================
  # Build Job - Build against DuckDB stable on representative platforms
  # (Manual trigger only via workflow_dispatch)
  # ============================================================================
  build:
    name: Build (${{ matrix.platform.id }})
    runs-on: ${{ matrix.platform.runner }}
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_build) || github.event_name == 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux x86_64 - with Docker support for integration tests
          - id: linux_amd64
            os: linux
            arch: amd64
            runner: ubuntu-22.04
            docker_available: true
            vcpkg_triplet: x64-linux

          # macOS ARM64 - load-only testing
          - id: osx_arm64
            os: osx
            arch: arm64
            runner: macos-14
            docker_available: false
            vcpkg_triplet: arm64-osx

    env:
      # Send vcpkg's binary cache to a directory actions/cache persists (see
      # the "Cache vcpkg binary packages" step). Without this, vcpkg falls back
      # to its default files provider under $HOME/.cache/vcpkg/archives, which
      # nothing caches -- so every run rebuilt OpenSSL from source.
      VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg_bincache,readwrite'

    steps:
      - uses: actions/checkout@v7

      - name: Checkout DuckDB submodule
        run: |
          git submodule update --init --recursive duckdb

      - name: Log build metadata
        id: duckdb
        run: |
          DUCKDB_COMMIT=$(git -C duckdb rev-parse HEAD)
          DUCKDB_BRANCH=$(git -C duckdb branch --show-current 2>/dev/null || git config -f .gitmodules submodule.duckdb.branch 2>/dev/null || echo "unknown")
          echo "commit=$DUCKDB_COMMIT" >> $GITHUB_OUTPUT
          echo "============================================"
          echo "Build Metadata"
          echo "============================================"
          echo "DuckDB Branch: $DUCKDB_BRANCH"
          echo "DuckDB Commit: $DUCKDB_COMMIT"
          echo "Platform: ${{ matrix.platform.id }}"
          echo "Runner: ${{ matrix.platform.runner }}"
          echo "============================================"

      - name: Setup Ninja
        run: |
          if [ "${{ matrix.platform.os }}" = "osx" ]; then
            brew install ninja ccache
          else
            sudo apt-get update
            # libkrb5-dev enables the integrated-auth (Kerberos) build path so
            # the shipped artifact contains the spec 053 dlopen shim; the
            # readelf guard below then verifies it carries no hard DT_NEEDED.
            sudo apt-get install -y ninja-build ccache libkrb5-dev
          fi

      # Cache ccache to speed up compilation
      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.platform.id }}-${{ steps.duckdb.outputs.commit }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.platform.id }}-${{ steps.duckdb.outputs.commit }}-
            ccache-${{ matrix.platform.id }}-

      - name: Configure ccache
        run: |
          # 2G (was 500M): a full DuckDB object set overflows 500M and evicts
          # itself mid-build, so warm runs were partially cold. 2G holds the
          # DuckDB + extension objects across runs for a much higher hit rate.
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          ccache -z

      - name: Setup vcpkg
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh
          fi

      # Cache vcpkg's BINARY cache (the archives dir), not the install tree.
      #
      # The previous version cached vcpkg/installed + vcpkg/packages +
      # vcpkg/buildtrees, which never worked: in manifest mode vcpkg installs
      # into build/release/vcpkg_installed and looks for prebuilt archives in
      # its binary cache, so none of those three paths were ever consulted.
      # Runs 29339658347 and 29345077972 both logged
      #   "Cache restored from key: vcpkg-x64-linux-..."   (a HIT)
      #   "Building openssl:x64-linux@3.4.1..."            (rebuilt anyway)
      # i.e. ~2 min of OpenSSL rebuild per run despite a green cache hit.
      #
      # Pointing VCPKG_BINARY_SOURCES at a `files` dir and caching THAT dir is
      # what actually elides the rebuild. Archives are keyed by vcpkg's ABI
      # hash, so a stale restore can't produce a wrong binary -- vcpkg simply
      # misses and rebuilds. That makes the prefix restore-key safe.
      - name: Cache vcpkg binary packages
        uses: actions/cache@v6
        with:
          path: vcpkg_bincache
          key: vcpkg-bincache-${{ matrix.platform.vcpkg_triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-bincache-${{ matrix.platform.vcpkg_triplet }}-

      - name: Build Release
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          mkdir -p build/release
          cd build/release
          cmake -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_TOOLCHAIN_FILE="$(pwd)/../../vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_MANIFEST_DIR="$(pwd)/../.." \
            -DDUCKDB_EXTENSION_CONFIGS="$(pwd)/../../extension_config.cmake" \
            ../../duckdb
          cmake --build . --config Release

      - name: Show ccache stats
        run: ccache -s

      # Standalone C++ unit tests (test/cpp/*) — pure in-memory, no SQL Server.
      # Reuses the simdutf already built by vcpkg for the release tree.
      - name: Run C++ unit tests
        run: |
          set -euo pipefail
          PREFIX="build/release/vcpkg_installed/${{ matrix.platform.vcpkg_triplet }}"
          if [ ! -f "$PREFIX/include/simdutf.h" ]; then
            echo "simdutf not found under $PREFIX" >&2
            ls -R build/release/vcpkg_installed 2>/dev/null | head -50 >&2 || true
            exit 1
          fi
          mkdir -p build/test
          echo "::group::test_login7_encoding (spec 043 + issue #138 LOGIN7 fragmentation)"
          "${CXX:-c++}" -std=c++17 -pthread -Wno-deprecated-declarations -DMSSQL_BENCH_BUILD \
            -I src/include -I duckdb/src/include -I "$PREFIX/include" \
            test/cpp/test_login7_encoding.cpp \
            src/tds/tds_packet.cpp src/tds/tds_protocol.cpp src/tds/tds_types.cpp src/tds/encoding/utf16.cpp \
            -L "$PREFIX/lib" -lsimdutf \
            -o build/test/test_login7_encoding
          ./build/test/test_login7_encoding
          echo "::endgroup::"

          echo "::group::test_login_error_state (issue #164 — capture LOGIN7 18456 State byte)"
          # TDS-only, like test_login7_encoding above: no libduckdb, just the
          # protocol parser. Pins LoginResponse::error_state so 18456 failures
          # surface the State that distinguishes bad password from inaccessible db.
          "${CXX:-c++}" -std=c++17 -pthread -Wno-deprecated-declarations \
            -I src/include -I duckdb/src/include -I "$PREFIX/include" \
            test/cpp/test_login_error_state.cpp \
            src/tds/tds_packet.cpp src/tds/tds_protocol.cpp src/tds/tds_types.cpp src/tds/encoding/utf16.cpp \
            -L "$PREFIX/lib" -lsimdutf \
            -o build/test/test_login_error_state
          ./build/test/test_login_error_state
          echo "::endgroup::"

          echo "::group::test_datetime_codec (codec::datetime — issue #168 datetime2(7) overflow -> NULL)"
          # Unlike the TDS-only test above, the codec test uses DuckDB
          # Value/Vector/Date/Timestamp, so it links the libduckdb just built in
          # this job (build/release/src). Mirrors the Makefile `test-codec-datetime`
          # recipe: all src/codec/*.cpp + the encoding helpers, -lsimdutf -lduckdb.
          "${CXX:-c++}" -std=c++17 -pthread -Wno-deprecated-declarations \
            -I src/include -I duckdb/src/include -I "$PREFIX/include" \
            test/cpp/codec/test_datetime_codec.cpp \
            src/codec/*.cpp \
            src/tds/encoding/utf16.cpp src/tds/encoding/datetime_encoding.cpp \
            src/tds/encoding/decimal_encoding.cpp src/tds/encoding/guid_encoding.cpp \
            -L "$PREFIX/lib" -lsimdutf \
            -L build/release/src -lduckdb \
            -o build/test/test_datetime_codec
          LD_LIBRARY_PATH=build/release/src DYLD_LIBRARY_PATH=build/release/src ./build/test/test_datetime_codec
          echo "::endgroup::"

      # Spec 053 (#161): the shipped Linux extension must NOT hard-link the
      # Kerberos runtime, or it fails to LOAD on images without it. GSSAPI/krb5
      # are dlopen'd lazily, so they must be absent from DT_NEEDED.
      - name: Verify lazy Kerberos linking on the extension (no DT_NEEDED) [Linux]
        if: matrix.platform.os == 'linux'
        run: |
          EXT=build/release/extension/mssql/mssql.duckdb_extension
          echo "Dynamic dependencies of $EXT:"
          readelf -d "$EXT" | grep NEEDED || true
          if readelf -d "$EXT" | grep NEEDED | grep -iqE 'gssapi|krb5'; then
            echo "::error::Kerberos runtime is a hard (DT_NEEDED) dependency of the extension — issue #161 regression (spec 053)."
            exit 1
          fi
          echo "OK: no gssapi/krb5 in DT_NEEDED — extension loads without the Kerberos runtime installed."

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v7
        with:
          name: mssql-extension-${{ matrix.platform.id }}
          path: build/release/extension/mssql/mssql.duckdb_extension
          if-no-files-found: error

      - name: Upload DuckDB CLI Artifact
        uses: actions/upload-artifact@v7
        with:
          name: duckdb-cli-${{ matrix.platform.id }}
          path: build/release/duckdb
          if-no-files-found: error

      - name: Upload unittest Artifact
        uses: actions/upload-artifact@v7
        with:
          name: unittest-${{ matrix.platform.id }}
          path: build/release/test/unittest
          if-no-files-found: error

      - name: Upload libduckdb Artifact (for unittest)
        uses: actions/upload-artifact@v7
        with:
          name: libduckdb-${{ matrix.platform.id }}
          path: |
            build/release/src/libduckdb.so
            build/release/src/libduckdb.dylib
          if-no-files-found: warn

  # ============================================================================
  # Smoke Test Job - Load-only test on all platforms
  # (Manual trigger only via workflow_dispatch)
  # ============================================================================
  smoke-test:
    name: Smoke Test (${{ matrix.platform.id }})
    runs-on: ${{ matrix.platform.runner }}
    needs: build
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_build) || github.event_name == 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - id: linux_amd64
            os: linux
            runner: ubuntu-22.04
            docker_available: true

          - id: osx_arm64
            os: osx
            runner: macos-14
            docker_available: false

    steps:
      - uses: actions/checkout@v7

      - name: Download extension artifact
        uses: actions/download-artifact@v8
        with:
          name: mssql-extension-${{ matrix.platform.id }}
          path: extension

      - name: Download DuckDB CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: duckdb-cli-${{ matrix.platform.id }}
          path: cli

      - name: Setup executables
        run: |
          chmod +x cli/duckdb
          chmod +x scripts/ci/smoke_test.sh

      - name: Run load-only smoke test
        run: |
          scripts/ci/smoke_test.sh ./cli/duckdb ./extension/mssql.duckdb_extension

      - name: Log integration test status (non-Linux)
        if: matrix.platform.docker_available == false
        run: |
          echo "============================================"
          echo "Integration test skipped - Docker not available on ${{ matrix.platform.id }}"
          echo "Load-only smoke test passed successfully"
          echo "============================================"

  # ============================================================================
  # Integration Test Job - SQL Server tests on Linux only
  # (Manual trigger only via workflow_dispatch)
  # ============================================================================
  integration-test:
    name: Integration Test (linux_amd64)
    runs-on: ubuntu-22.04
    needs: build
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_build && inputs.run_integration_tests) || github.event_name == 'schedule' }}

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: TestPassword1
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P TestPassword1 -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v7

      - name: Download extension artifact
        uses: actions/download-artifact@v8
        with:
          name: mssql-extension-linux_amd64
          path: extension

      - name: Download DuckDB CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: duckdb-cli-linux_amd64
          path: cli

      - name: Setup executables
        run: |
          chmod +x cli/duckdb
          chmod +x scripts/ci/integration_test.sh

      - name: Wait for SQL Server
        run: |
          echo "Waiting for SQL Server to be ready..."
          timeout 120 bash -c 'until echo > /dev/tcp/localhost/1433 2>/dev/null; do sleep 5; done'
          echo "SQL Server is ready!"

      - name: Run integration tests
        run: |
          scripts/ci/integration_test.sh ./cli/duckdb ./extension/mssql.duckdb_extension

  # ============================================================================
  # Windows Build Job - MSVC (Visual Studio 2022)
  # Matches community-extensions CI configuration
  # (Manual trigger only via workflow_dispatch)
  # ============================================================================
  build-windows-msvc:
    name: Build Windows (MSVC)
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_windows_build }}

    env:
      # Must be set explicitly: run-vcpkg otherwise forces the dead x-gha
      # provider on GitHub runners. Its own source says
      #   "Allow users to define the vcpkg's binary source explicitly in the
      #    workflow, in that case do not override it."
      #   setVariableIfUndefined(VCPKG_BINARY_SOURCES, 'clear;x-gha,readwrite')
      # so defining it here is the supported opt-out.
      VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg_bincache,readwrite'

    steps:
      - uses: actions/checkout@v7

      - name: Checkout DuckDB submodule
        shell: bash
        run: |
          git submodule update --init --recursive duckdb

      - name: Log build metadata
        id: duckdb
        shell: bash
        run: |
          DUCKDB_COMMIT=$(git -C duckdb rev-parse HEAD)
          echo "commit=$DUCKDB_COMMIT" >> $GITHUB_OUTPUT
          echo "============================================"
          echo "Build Metadata"
          echo "============================================"
          echo "DuckDB Commit: $DUCKDB_COMMIT"
          echo "Platform: windows_amd64 (MSVC)"
          echo "vcpkg Triplet: x64-windows-static-release (matches community-extensions CI / extension-ci-tools main)"
          echo "============================================"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '65604f5075c64b18a84c30de400def13aad2e0ec'

      # Caches the binary-cache dir named by VCPKG_BINARY_SOURCES above, not
      # the install tree -- see the linux/macos build job for why the old
      # vcpkg/installed + vcpkg/packages paths never elided a rebuild.
      - name: Cache vcpkg binary packages
        uses: actions/cache@v6
        with:
          path: vcpkg_bincache
          key: vcpkg-bincache-windows-msvc-x64-windows-static-release-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-bincache-windows-msvc-x64-windows-static-release-

      - name: Setup Visual Studio Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/release
          Push-Location build/release
          cmake -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:RUNVCPKG_VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-release `
            -DVCPKG_HOST_TRIPLET=x64-windows-static-release `
            -DVCPKG_MANIFEST_DIR="$(Get-Location)/../.." `
            -DDUCKDB_EXTENSION_CONFIGS="$(Get-Location)/../../extension_config.cmake" `
            ../../duckdb
          cmake --build . --config Release
          Pop-Location

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v7
        with:
          name: mssql-extension-windows_amd64_msvc
          path: build/release/extension/mssql/mssql.duckdb_extension
          if-no-files-found: error

      - name: Upload DuckDB CLI Artifact
        uses: actions/upload-artifact@v7
        with:
          name: duckdb-cli-windows_amd64_msvc
          path: build/release/duckdb.exe
          if-no-files-found: error

  # ============================================================================
  # Windows Build Job - MinGW (Rtools 4.2)
  # Matches community-extensions CI configuration
  # (Manual trigger only via workflow_dispatch)
  # ============================================================================
  build-windows-mingw:
    name: Build Windows (MinGW)
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_windows_build }}
    env:
      CC: gcc
      CXX: g++
      # See the MSVC job: defining this is the supported way to stop run-vcpkg
      # forcing the removed x-gha provider.
      VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg_bincache,readwrite'

    steps:
      - uses: actions/checkout@v7

      - name: Checkout DuckDB submodule
        shell: bash
        run: |
          git submodule update --init --recursive duckdb

      - name: Log build metadata
        id: duckdb
        shell: bash
        run: |
          DUCKDB_COMMIT=$(git -C duckdb rev-parse HEAD)
          echo "commit=$DUCKDB_COMMIT" >> $GITHUB_OUTPUT
          echo "============================================"
          echo "Build Metadata"
          echo "============================================"
          echo "DuckDB Commit: $DUCKDB_COMMIT"
          echo "Platform: windows_amd64 (MinGW)"
          echo "vcpkg Triplet: x64-mingw-static"
          echo "============================================"

      # Setup Rtools 4.2 for MinGW compiler
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'devel'
          update-rtools: true
          rtools-version: '42'

      - name: Setup rtools gcc for vcpkg
        shell: bash
        run: |
          cp C:/rtools42/x86_64-w64-mingw32.static.posix/bin/gcc.exe C:/rtools42/x86_64-w64-mingw32.static.posix/bin/x86_64-w64-mingw32-gcc.exe
          cp C:/rtools42/x86_64-w64-mingw32.static.posix/bin/g++.exe C:/rtools42/x86_64-w64-mingw32.static.posix/bin/x86_64-w64-mingw32-g++.exe
          echo "C:/rtools42/x86_64-w64-mingw32.static.posix/bin" >> $GITHUB_PATH
          echo "C:/rtools42/usr/bin" >> $GITHUB_PATH

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '65604f5075c64b18a84c30de400def13aad2e0ec'

      # Caches the binary-cache dir named by VCPKG_BINARY_SOURCES above. This
      # is the job that pays most for the old broken setup: run 29540869000
      # spent 6.9 min compiling OpenSSL for x64-mingw-static from scratch.
      - name: Cache vcpkg binary packages
        uses: actions/cache@v6
        with:
          path: vcpkg_bincache
          key: vcpkg-bincache-windows-mingw-x64-mingw-static-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-bincache-windows-mingw-x64-mingw-static-

      - name: Build Release
        shell: bash
        run: |
          mkdir -p build/release
          cd build/release
          cmake -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_TOOLCHAIN_FILE="$RUNVCPKG_VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-static \
            -DVCPKG_HOST_TRIPLET=x64-mingw-static \
            -DVCPKG_MANIFEST_DIR="$(pwd)/../.." \
            -DDUCKDB_EXTENSION_CONFIGS="$(pwd)/../../extension_config.cmake" \
            ../../duckdb
          cmake --build . --config Release

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v7
        with:
          name: mssql-extension-windows_amd64_mingw
          path: build/release/extension/mssql/mssql.duckdb_extension
          if-no-files-found: error

      - name: Upload DuckDB CLI Artifact
        uses: actions/upload-artifact@v7
        with:
          name: duckdb-cli-windows_amd64_mingw
          path: build/release/duckdb.exe
          if-no-files-found: error

  # ============================================================================
  # Windows Smoke Test Job - Verify extension loads on Windows
  # (Manual trigger only via workflow_dispatch)
  # ============================================================================
  smoke-test-windows:
    name: Smoke Test Windows (${{ matrix.config.name }})
    runs-on: windows-latest
    needs: [build-windows-msvc, build-windows-mingw]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_windows_build }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: MSVC
            artifact_suffix: windows_amd64_msvc
          - name: MinGW
            artifact_suffix: windows_amd64_mingw

    steps:
      - uses: actions/checkout@v7

      - name: Download extension artifact
        uses: actions/download-artifact@v8
        with:
          name: mssql-extension-${{ matrix.config.artifact_suffix }}
          path: extension

      - name: Download DuckDB CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: duckdb-cli-${{ matrix.config.artifact_suffix }}
          path: cli

      - name: Run load-only smoke test
        shell: bash
        run: |
          echo "Testing extension load for ${{ matrix.config.name }} build..."
          ./cli/duckdb.exe -unsigned -c "LOAD 'extension/mssql.duckdb_extension'; SELECT mssql_version();"
          echo "Smoke test passed!"

  # ============================================================================
  # Azure Test Job - Azure SQL Database and Fabric tests
  # Uses 'test' environment for secrets (AZURE_APP_ID, AZURE_APP_SECRET, etc.)
  # Runs DuckDB unittest with [azure] test group
  # (Manual trigger only via workflow_dispatch)
  # ============================================================================
  azure-test:
    name: Azure Test (linux_amd64)
    runs-on: ubuntu-22.04
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_build && inputs.run_azure_tests && github.ref != 'refs/heads/main' }}
    environment: test

    steps:
      - uses: actions/checkout@v7

      - name: Download unittest artifact
        uses: actions/download-artifact@v8
        with:
          name: unittest-linux_amd64
          path: test

      - name: Download libduckdb artifact
        uses: actions/download-artifact@v8
        with:
          name: libduckdb-linux_amd64
          path: lib

      - name: Setup executables
        run: |
          chmod +x test/unittest

      - name: Run Azure tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/lib
          AZURE_SQL_TEST_DSN: ${{ secrets.AZURE_SQL_TEST_DSN }}
          AZURE_APP_ID: ${{ secrets.AZURE_APP_ID }}
          AZURE_DIRECTORY_ID: ${{ secrets.AZURE_DIRECTORY_ID }}
          AZURE_APP_SECRET: ${{ secrets.AZURE_APP_SECRET }}
          AZURE_SQL_DB_HOST: ${{ secrets.AZURE_SQL_DB_HOST }}
          AZURE_SQL_DB: ${{ secrets.AZURE_SQL_DB }}
        run: |
          echo "============================================"
          echo "Running Azure Tests with unittest"
          echo "============================================"
          echo "AZURE_APP_ID is set: $([ -n \"$AZURE_APP_ID\" ] && echo 'yes' || echo 'no')"
          echo "AZURE_DIRECTORY_ID is set: $([ -n \"$AZURE_DIRECTORY_ID\" ] && echo 'yes' || echo 'no')"
          echo "AZURE_APP_SECRET is set: $([ -n \"$AZURE_APP_SECRET\" ] && echo 'yes' || echo 'no')"
          echo "LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
          echo "============================================"

          # Run Azure test group
          ./test/unittest "[azure]" --force-reload

          echo "Azure tests completed!"
